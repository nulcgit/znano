<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar</title>
</head>
<body style="background-color: #f1f1f1;">
    <button id="home-btn">H</button>
    <button id="back-btn">&lt</button>
    <button id="reload-btn">@</button>
    <button id="forward-btn">&gt</button>
    <button id="go-btn">Go</button>
    <input type="text" id="url-input" placeholder="Enter URL" style="width: 90%;">
    <br>
    <button id="save-page" title="Save current page">Save</button>
     
    <script>
        document.getElementById('home-btn').addEventListener('click', () => {
            window.electron.goHome();
        });

        document.getElementById('back-btn').addEventListener('click', () => {
            window.electron.goBack();
        });

        document.getElementById('forward-btn').addEventListener('click', () => {
            window.electron.goForward();
        });

        document.getElementById('reload-btn').addEventListener('click', () => {
            window.electron.reload();
        });

        document.getElementById('go-btn').addEventListener('click', () => {
            const url = document.getElementById('url-input').value;
            window.electron.navigate(url);
        });        

        document.getElementById('url-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const url = document.getElementById('url-input').value;
                window.electron.navigate(url);
            }
        });

        document.getElementById('save-page').addEventListener('click', () => {
            window.electron.savePage()
        });
        
    </script>
</body>
</html>
